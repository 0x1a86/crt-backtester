<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CRT Backtester</title>
<style>
  :root{
    --bg:#0a0a0f;--sf:#111118;--bd:#1e1e2e;--bb:#2a2a3e;
    --tx:#e2e2f0;--mt:#6b6b8a;--bull:#00c896;--bear:#ff4d6d;
    --wk:#f0b429;--ac:#7c6fff;--dm:rgba(124,111,255,0.12);
    --mono:'SF Mono','Fira Code','Consolas',monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased;}
  header{border-bottom:1px solid var(--bd);padding:16px 20px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
  header h1{font-size:15px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ac);}
  header span{font-size:11px;color:var(--mt);font-family:var(--mono);}
  .layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 53px);}
  aside{border-right:1px solid var(--bd);padding:20px 16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;}
  .fl{display:block;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mt);margin-bottom:5px;}
  .fh{font-size:10px;color:var(--mt);margin-top:4px;line-height:1.5;}
  select,input[type=number]{width:100%;background:var(--sf);border:1px solid var(--bb);border-radius:6px;color:var(--tx);font-family:var(--mono);font-size:13px;padding:8px 10px;outline:none;appearance:none;-webkit-appearance:none;}
  select:focus,input:focus{border-color:var(--ac);}
  .run-btn{width:100%;padding:11px;background:var(--ac);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-top:auto;transition:opacity .15s,transform .1s;}
  .run-btn:active{transform:scale(.98);opacity:.85;}
  .run-btn:disabled{opacity:.4;cursor:not-allowed;}
  main{padding:20px;display:flex;flex-direction:column;gap:20px;overflow-x:hidden;}
  .status{font-family:var(--mono);font-size:12px;color:var(--mt);}
  .status.loading{color:var(--ac);}.status.error{color:var(--bear);}.status.done{color:var(--bull);}
  .tabs{display:flex;border-bottom:1px solid var(--bd);}
  .tab{padding:8px 14px;font-size:12px;font-weight:600;color:var(--mt);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;}
  .tab.active{color:var(--ac);border-bottom-color:var(--ac);}
  .tc{display:none;flex-direction:column;gap:20px;}
  .tc.active{display:flex;}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:10px;}
  .card{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;}
  .cl{font-size:10px;color:var(--mt);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
  .cv{font-size:20px;font-weight:700;font-family:var(--mono);line-height:1;}
  .cs{font-size:11px;color:var(--mt);margin-top:4px;font-family:var(--mono);}
  .bull{color:var(--bull);}.bear{color:var(--bear);}.wc{color:var(--wk);}.ac{color:var(--ac);}
  .st{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--mt);border-bottom:1px solid var(--bd);padding-bottom:8px;margin-bottom:12px;}
  .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .g2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  .tb{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:12px;}
  .tt{font-size:10px;color:var(--mt);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
  .br{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .bl{font-family:var(--mono);font-size:11px;color:var(--mt);width:44px;flex-shrink:0;}
  .btr{flex:1;height:4px;background:var(--bd);border-radius:2px;overflow:hidden;}
  .bf{height:100%;border-radius:2px;background:var(--ac);}
  .bc{font-family:var(--mono);font-size:11px;color:var(--tx);width:24px;text-align:right;flex-shrink:0;}
  .tw{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--bd);border-radius:8px;}
  table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;white-space:nowrap;}
  thead tr{background:var(--sf);border-bottom:1px solid var(--bd);}
  th{padding:9px 11px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mt);}
  td{padding:7px 11px;border-bottom:1px solid var(--bd);color:var(--tx);}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:rgba(124,111,255,.04);}
  .tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;}
  .tbull{background:rgba(0,200,150,.12);color:var(--bull);}
  .tbear{background:rgba(255,77,109,.12);color:var(--bear);}
  .twk{background:rgba(240,180,41,.12);color:var(--wk);}
  .tcl{background:rgba(124,111,255,.12);color:var(--ac);}
  .tdel{background:rgba(0,200,150,.12);color:var(--bull);}
  .tpar{background:rgba(240,180,41,.12);color:var(--wk);}
  .tstop{background:rgba(255,77,109,.08);color:#ff8099;}
  .tmis{background:rgba(107,107,138,.15);color:var(--mt);}
  .tfvg{background:rgba(124,111,255,.15);color:#a89fff;}
  .tob{background:rgba(240,180,41,.15);color:#f0c070;}
  .traw{background:rgba(0,200,150,.08);color:#80e0c0;}
  .t1m{background:rgba(240,180,41,.12);color:var(--wk);}
  .t1w{background:rgba(124,111,255,.12);color:var(--ac);}
  .t1d{background:rgba(0,200,150,.12);color:var(--bull);}
  .db{display:flex;align-items:center;gap:6px;}
  .dp{font-size:11px;width:34px;}
  .mb{width:50px;height:3px;background:var(--bd);border-radius:2px;overflow:hidden;}
  .mf{height:100%;border-radius:2px;}
  .ib{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:14px;}
  .it{font-size:10px;color:var(--mt);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
  .ir{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;border-bottom:1px solid var(--bd);}
  .ir:last-child{border-bottom:none;}
  .il{color:var(--mt);}.iv{font-family:var(--mono);font-weight:600;}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--mt);gap:10px;text-align:center;}
  @media(max-width:700px){
    .layout{grid-template-columns:1fr;}
    aside{border-right:none;border-bottom:1px solid var(--bd);}
    .g4{grid-template-columns:repeat(2,1fr);}
    .g2{grid-template-columns:1fr;}
    .cards{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>
<header>
  <h1>CRT Backtester</h1>
  <span>HTF CRT · FVG · OB · Turtle Soup · 0x1a86</span>
</header>
<div class="layout">
<aside>
  <div><label class="fl">Symbol</label>
    <select id="sym">
      <option value="BTCUSDT">BTC/USDT</option>
      <option value="ETHUSDT">ETH/USDT</option>
      <option value="SOLUSDT">SOL/USDT</option>
      <option value="BNBUSDT">BNB/USDT</option>
      <option value="XRPUSDT">XRP/USDT</option>
    </select>
  </div>
  <div><label class="fl">Entry TF</label>
    <select id="etf"><option value="1h">1 Hour</option><option value="4h">4 Hour</option></select>
    <div class="fh">Session candle for entry detection</div>
  </div>
  <div><label class="fl">Daily Candles</label><input type="number" id="dlim" value="500" min="100" max="1000" step="100"></div>
  <div><label class="fl">Entry TF Candles</label><input type="number" id="elim" value="2000" min="500" max="5000" step="500"></div>
  <div><label class="fl">Entry Window (days)</label>
    <input type="number" id="ewin" value="7" min="1" max="30" step="1">
    <div class="fh">Days after HTF CRT to search for entry</div>
  </div>
  <div><label class="fl">Max Capital Loss %</label>
    <input type="number" id="capLoss" value="5" min="1" max="20" step="1">
    <div class="fh">SL sized by capital risk, not wick distance</div>
  </div>
  <div><label class="fl">Min Delivery %</label><input type="number" id="mdel" value="50" min="0" max="100" step="5"></div>
  <button class="run-btn" id="runBtn" onclick="run()">Run Backtest</button>
</aside>
<main id="main">
  <div class="empty">
    <div style="font-size:32px;opacity:.3">◈</div>
    <div style="font-size:13px">HTF CRT → FVG / OB / Raw Level Entry</div>
    <div style="font-size:11px;opacity:.6">Monthly dominates · Any TF level valid · 5% capital SL</div>
  </div>
</main>
</div>
<script>
// ── Fetch Binance
async function fetch0(sym,tf,lim){
  const url=`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${tf}&limit=${lim}`;
  let r;
  try{r=await fetch(url);if(!r.ok)throw 0;}
  catch{r=await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);}
  if(!r.ok)throw new Error(`Binance ${r.status}`);
  const d=await r.json();
  return d.map(c=>({ts:+c[0],o:+c[1],h:+c[2],l:+c[3],c:+c[4],v:+c[5]}));
}

// ── Time context
function tctx(ts){
  const d=new Date(ts),h=d.getUTCHours(),day=d.getUTCDate();
  const dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getUTCDay()];
  const wom=day<=7?'W1':day<=14?'W2':day<=21?'W3':day<=28?'W4':'W5';
  const moy=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getUTCMonth()];
  let ses='Asia';
  if(h>=7&&h<12)ses='London';
  else if(h>=12&&h<20)ses='New York';
  else if(h>=20)ses='Late NY';
  return{ses,dow,wom,moy};
}

// ── CRT signal: candle relative to previous candle range
// Returns {dir,type} or null
function crtSig(prev,cur){
  const pH=prev.h,pL=prev.l;
  // Bearish wick: sweeps above prev high, closes back inside
  if(cur.h>pH&&cur.c<=pH&&cur.c>=pL) return{dir:'BEAR',type:'wick'};
  // Bullish wick: sweeps below prev low, closes back inside
  if(cur.l<pL&&cur.c>=pL&&cur.c<=pH) return{dir:'BULL',type:'wick'};
  // Bearish close: closes below prev low
  if(cur.c<pL) return{dir:'BEAR',type:'close'};
  // Bullish close: closes above prev high
  if(cur.c>pH) return{dir:'BULL',type:'close'};
  return null;
}

// ── Detect FVGs in candle array
function detectFVGs(candles){
  const out=[];
  for(let i=1;i<candles.length-1;i++){
    const a=candles[i-1],b=candles[i],nx=candles[i+1];
    // Bullish FVG: gap up (imbalance above — bearish context, price may fill going up)
    if(a.h<nx.l) out.push({type:'bull',ts:b.ts,idx:i,top:nx.l,bot:a.h,mid:(nx.l+a.h)/2});
    // Bearish FVG: gap down (imbalance below — bullish context, price may fill going down)
    if(a.l>nx.h) out.push({type:'bear',ts:b.ts,idx:i,top:a.l,bot:nx.h,mid:(a.l+nx.h)/2});
  }
  return out;
}

// ── Check if FVG tested after formation
function fvgTested(fvg,candles){
  for(let i=fvg.idx+2;i<candles.length;i++){
    const c=candles[i];
    if(fvg.type==='bull'&&c.l<=fvg.top) return true;
    if(fvg.type==='bear'&&c.h>=fvg.bot) return true;
  }
  return false;
}

// ── Detect Orderblocks in candle array
// OB = candle that liquidated a high/low AND is fully engulfed by a subsequent candle
function detectOBs(candles){
  const out=[];
  for(let i=1;i<candles.length;i++){
    const cur=candles[i];

    // ── Bearish OB: candle liquidated a high (took above prev high)
    // then engulfed by subsequent candle
    if(cur.h>candles[i-1].h){
      for(let j=i+1;j<Math.min(i+5,candles.length);j++){
        const nx=candles[j];
        if(nx.h>=cur.h&&nx.l<=cur.l){
          // Long wick = upper wick > body → entry at 50% of wick-to-open
          // Thick body = body >= wick → entry at 50% of open-to-midpoint
          const upperWick=cur.h-Math.max(cur.o,cur.c);
          const bodySize=Math.abs(cur.c-cur.o);
          const isLongWick=upperWick>bodySize;
          const obOpen=Math.max(cur.o,cur.c); // open of OB (higher of o/c for bearish)
          const entryPrice=isLongWick
            ?(cur.h+obOpen)/2          // 50% of wick to open
            :(obOpen+(cur.h+cur.l)/2)/2; // 50% of open to midpoint
          // Stop: above OB high
          const stopRef=cur.h;
          out.push({type:'bear',ts:cur.ts,idx:i,
            high:cur.h,low:cur.l,open:cur.o,close:cur.c,
            isLongWick,entryPrice,stopRef,engulfIdx:j});
          break;
        }
      }
    }

    // ── Bullish OB: candle liquidated a low (took below prev low)
    // then engulfed by subsequent candle
    if(cur.l<candles[i-1].l){
      for(let j=i+1;j<Math.min(i+5,candles.length);j++){
        const nx=candles[j];
        if(nx.h>=cur.h&&nx.l<=cur.l){
          const lowerWick=Math.min(cur.o,cur.c)-cur.l;
          const bodySize=Math.abs(cur.c-cur.o);
          const isLongWick=lowerWick>bodySize;
          const obOpen=Math.min(cur.o,cur.c); // open of OB (lower of o/c for bullish)
          const entryPrice=isLongWick
            ?(cur.l+obOpen)/2          // 50% of wick to open
            :(obOpen+(cur.h+cur.l)/2)/2; // 50% of open to midpoint
          // Stop: below OB low
          const stopRef=cur.l;
          out.push({type:'bull',ts:cur.ts,idx:i,
            high:cur.h,low:cur.l,open:cur.o,close:cur.c,
            isLongWick,entryPrice,stopRef,engulfIdx:j});
          break;
        }
      }
    }
  }
  return out;
}

// ── Get dominant HTF CRT: Monthly → Weekly → Daily
// Session is detected from 1H candles — find the hour the manipulation wick actually formed
function getDominantCRT(ts,data,hourly){
  const order=['1M','1w','1d'];
  for(const tf of order){
    if(!data[tf]) continue;
    const arr=data[tf];
    for(let i=arr.length-1;i>=1;i--){
      if(arr[i].ts>ts) continue;
      const sig=crtSig(arr[i-1],arr[i]);
      if(!sig) continue;

      // ── Find the 1H candle where the wick extreme was formed
      // For bearish wick: find 1H candle with highest high inside this HTF candle period
      // For bullish wick: find 1H candle with lowest low inside this HTF candle period
      let wickTs=arr[i].ts; // fallback to HTF candle open
      if(hourly&&hourly.length){
        const htfStart=arr[i].ts;
        // Approximate HTF candle duration
        const tfMs=tf==='1M'?30*24*3600*1000:tf==='1w'?7*24*3600*1000:24*3600*1000;
        const htfEnd=htfStart+tfMs;
        const within1H=hourly.filter(h=>h.ts>=htfStart&&h.ts<htfEnd);
        if(within1H.length){
          if(sig.dir==='BEAR'){
            // Wick is the high — find which 1H candle made the highest high
            const extreme=within1H.reduce((best,h)=>h.h>best.h?h:best,within1H[0]);
            wickTs=extreme.ts;
          } else {
            // Wick is the low — find which 1H candle made the lowest low
            const extreme=within1H.reduce((best,h)=>h.l<best.l?h:best,within1H[0]);
            wickTs=extreme.ts;
          }
        }
      }

      const ctx=tctx(wickTs);
      const manipLevel=sig.dir==='BEAR'?arr[i-1].h:arr[i-1].l;
      const htfTarget =sig.dir==='BEAR'?arr[i-1].l:arr[i-1].h;
      const rangeSize =arr[i-1].h-arr[i-1].l;
      const partial50 =sig.dir==='BEAR'
        ?manipLevel-(rangeSize*0.5)
        :manipLevel+(rangeSize*0.5);
      return{
        tf,dir:sig.dir,type:sig.type,
        crtTs:arr[i].ts,wickTs,
        rangeHigh:arr[i-1].h,rangeLow:arr[i-1].l,
        wickHigh:arr[i].h,wickLow:arr[i].l,
        manipLevel,htfTarget,partial50,
        crtSes:ctx.ses,crtDow:ctx.dow,crtWom:ctx.wom,crtMoy:ctx.moy,
      };
    }
  }
  return null;
}

// ── Find best entry at a daily level
// Priority: OB > FVG > Raw high/low
// Returns {entryPrice, entryType, fvgData, obData}
function findEntry(dir,dailyLevel,dailyTs,dailyFVGs,dailyOBs,dailyArr,dailyIdx){
  // 1. Check for engulfed OB near the daily level
  // Look for OB candles that formed before this daily signal, near the level
  const relevantOBs=dailyOBs.filter(ob=>{
    if(ob.ts>=dailyTs) return false;
    if(ob.type==='bear'&&dir==='BEAR') return Math.abs(ob.high-dailyLevel)/dailyLevel<0.02;
    if(ob.type==='bull'&&dir==='BULL') return Math.abs(ob.low-dailyLevel)/dailyLevel<0.02;
    return false;
  });
  if(relevantOBs.length){
    const ob=relevantOBs[relevantOBs.length-1];
    return{entryPrice:ob.entryPrice,entryType:'OB',fvg:null,ob};
  }

  // 2. Check for FVG near/above the daily level
  // Bearish: FVG above daily high — price expected to reach 50% of FVG before rejecting
  // Bullish: FVG below daily low — price expected to reach 50% of FVG before bouncing
  const relevantFVGs=dailyFVGs.filter(fvg=>{
    if(fvg.ts>=dailyTs) return false;
    if(dir==='BEAR'&&fvg.type==='bear'){
      // FVG above or at daily high level
      return fvg.bot>=dailyLevel*0.99&&fvg.bot<=dailyLevel*1.03;
    }
    if(dir==='BULL'&&fvg.type==='bull'){
      // FVG below or at daily low level
      return fvg.top<=dailyLevel*1.01&&fvg.top>=dailyLevel*0.97;
    }
    return false;
  });
  if(relevantFVGs.length){
    const fvg=relevantFVGs[relevantFVGs.length-1];
    const tested=fvgTested(fvg,dailyArr);
    return{entryPrice:fvg.mid,entryType:'FVG',fvg:{...fvg,tested},ob:null};
  }

  // 3. Raw high/low level
  return{entryPrice:dailyLevel,entryType:'RAW',fvg:null,ob:null};
}

// ── Timing score
function calcScore(htf,entryCtx){
  let s=0,m=0;
  // CRT type: wick=2, close=1
  m+=2;s+=htf.type==='wick'?2:1;
  // Manipulation timing
  m+=2;
  if(htf.tf==='1M'){
    if(['W1','W2','W3'].includes(htf.crtWom))s++;
    if(['Asia','London','New York'].includes(htf.crtSes))s++;
  }
  if(htf.tf==='1w'){
    if(['Mon','Tue','Wed'].includes(htf.crtDow))s++;
    if(['London','New York'].includes(htf.crtSes))s++;
  }
  if(htf.tf==='1d'){
    if(['London','New York'].includes(htf.crtSes))s+=2;
    else if(htf.crtSes==='Asia')s++;
  }
  // Entry session
  m+=1;if(['London','New York'].includes(entryCtx.ses))s++;
  return{s,m};
}

// ── Status
function setS(cls,msg){
  let el=document.getElementById('sl');
  if(!el){document.getElementById('main').innerHTML='<div id="sl" class="status"></div>';el=document.getElementById('sl');}
  el.className=`status ${cls}`;el.textContent=msg;
}

function bar(data,mx){
  return Object.entries(data).sort((a,b)=>b[1]-a[1]).map(([l,n])=>`
    <div class="br"><span class="bl">${l}</span>
    <div class="btr"><div class="bf" style="width:${Math.round(n/mx*100)}%"></div></div>
    <span class="bc">${n}</span></div>`).join('');
}

function dc(p){return p>=75?'#00c896':p>=50?'#f0b429':'#ff4d6d';}
function fd(ts){return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit',timeZone:'UTC'});}
function fp(p){return p>=1000?p.toLocaleString('en-US',{maximumFractionDigits:0}):p.toFixed(4);}

// ── Main
async function run(){
  const btn=document.getElementById('runBtn');
  btn.disabled=true;btn.textContent='Running…';
  document.getElementById('main').innerHTML='<div id="sl" class="status loading">Starting…</div>';

  try{
    const sym    =document.getElementById('sym').value;
    const etf    =document.getElementById('etf').value;
    const dlim   =parseInt(document.getElementById('dlim').value)||500;
    const elim   =parseInt(document.getElementById('elim').value)||2000;
    const ewin   =parseInt(document.getElementById('ewin').value)||7;
    const capLoss=parseFloat(document.getElementById('capLoss').value)||5;
    const mdel   =parseInt(document.getElementById('mdel').value)||50;

    const data={};
    for(const [tf,lim] of [['1M',120],['1w',200],['1d',dlim]]){
      setS('loading',`Fetching ${tf}…`);
      data[tf]=await fetch0(sym,tf,lim);
    }
    setS('loading',`Fetching ${etf} candles…`);
    const eCandles=await fetch0(sym,etf,elim);

    // Fetch 1H candles for accurate wick session detection
    setS('loading','Fetching 1H candles for wick timing…');
    const hourly=etf==='1h'?eCandles:await fetch0(sym,'1h',Math.min(elim,3000));

    setS('loading','Detecting FVGs and OBs on daily…');
    const dFVGs=detectFVGs(data['1d']);
    const dOBs =detectOBs(data['1d']);

    setS('loading','Running backtest…');

    const results=[];
    const dArr=data['1d'];
    const winMs=ewin*24*3600*1000;

    for(let i=1;i<dArr.length-1;i++){
      const prev=dArr[i-1],cur=dArr[i];

      // Get dominant HTF CRT at close of this daily candle
      const htf=getDominantCRT(cur.ts,data,hourly);
      if(!htf) continue;

      // Daily candle must form CRT in same direction as HTF
      const dSig=crtSig(prev,cur);
      if(!dSig||dSig.dir!==htf.dir) continue;

      // Daily manipulation level
      const dailyLevel=htf.dir==='BEAR'?prev.h:prev.l;

      // Find best entry: OB > FVG > Raw
      const{entryPrice,entryType,fvg,ob}=findEntry(
        htf.dir,dailyLevel,cur.ts,dFVGs,dOBs,dArr,i
      );

      // ── Stop Loss: sized by capital risk (5% max loss)
      // Stop is placed at the daily wick extreme + small buffer
      // Position size = (capital * capLoss%) / stopDist
      // We just measure the stop distance as % of entry for R:R calculation
      const wickExtreme=htf.dir==='BEAR'?cur.h:cur.l;
      const rawStopDist=Math.abs(entryPrice-wickExtreme);
      // Capital-based SL: if rawStopDist > capLoss% of entry, use capLoss% as max
      const maxStopDist=entryPrice*(capLoss/100);
      const stopDist=Math.min(rawStopDist,maxStopDist);
      const stopPrice=htf.dir==='BEAR'
        ?entryPrice+stopDist
        :entryPrice-stopDist;

      if(stopDist<=0) continue;

      // Targets
      const partial50=htf.partial50;
      const fullTarget=htf.htfTarget;
      const rr50  =Math.abs(partial50-entryPrice)/stopDist;
      const rrFull=Math.abs(fullTarget-entryPrice)/stopDist;

      // ── Find entry candle in ETF: price must reach entryPrice within window
      const winEnd=cur.ts+winMs;
      const winCandles=eCandles.filter(c=>c.ts>=cur.ts&&c.ts<=winEnd);
      let eCandle=null;
      for(const ec of winCandles){
        const reached=htf.dir==='BEAR'?ec.h>=entryPrice:ec.l<=entryPrice;
        if(reached){eCandle=ec;break;}
      }
      if(!eCandle) continue;

      const ectx=tctx(eCandle.ts);
      const{s,m}=calcScore(htf,ectx);

      // ── Measure delivery
      const eIdx=eCandles.findIndex(c=>c.ts===eCandle.ts);
      const fwd=eCandles.slice(eIdx,eIdx+500);
      let hit50=false,hitFull=false,hitStop=false,hitStopFirst=false,bestMoved=0;

      for(const fc of fwd){
        const moved=htf.dir==='BEAR'?(entryPrice-fc.l):(fc.h-entryPrice);
        bestMoved=Math.max(bestMoved,moved);
        if(htf.dir==='BEAR'){
          if(!hitStop&&fc.h>=stopPrice){hitStop=true;if(!hit50)hitStopFirst=true;}
          if(fc.l<=partial50)hit50=true;
          if(fc.l<=fullTarget)hitFull=true;
        } else {
          if(!hitStop&&fc.l<=stopPrice){hitStop=true;if(!hit50)hitStopFirst=true;}
          if(fc.h>=partial50)hit50=true;
          if(fc.h>=fullTarget)hitFull=true;
        }
      }

      const toFull=Math.abs(fullTarget-entryPrice);
      const delPct=toFull>0?Math.min(100,Math.round(bestMoved/toFull*100)):0;

      let outcome='missed';
      if(hitStopFirst)  outcome='stopped';
      else if(hitFull)  outcome='full_target';
      else if(hit50)    outcome='partial_50';
      else if(delPct>=mdel) outcome='partial';
      else              outcome='missed';

      results.push({
        htfTf:htf.tf,htfDir:htf.dir,htfType:htf.type,
        htfTs:htf.crtTs,
        crtSes:htf.crtSes,crtDow:htf.crtDow,crtWom:htf.crtWom,crtMoy:htf.crtMoy,
        dailyTs:cur.ts,dailyType:dSig.type,dailyLevel,
        entryTs:eCandle.ts,entryPrice,entryType,
        entrySession:ectx.ses,entryDow:ectx.dow,entryWom:ectx.wom,
        stopPrice,stopDist,
        partial50,fullTarget,
        rr50:rr50.toFixed(1),rrFull:rrFull.toFixed(1),
        hasFVG:!!fvg,fvgTested:fvg?fvg.tested:null,
        hasOB:!!ob,
        hit50,hitFull,hitStop,hitStopFirst,
        delPct,outcome,score:s,scoreMax:m,
      });
    }

    renderResults(results,sym,etf,capLoss);
  }catch(e){
    console.error(e);setS('error',`Error: ${e.message}`);
  }
  btn.disabled=false;btn.textContent='Run Backtest';
}

function renderResults(R,sym,etf,capLoss){
  const n=R.length;
  if(!n){
    document.getElementById('main').innerHTML=`
      <div id="sl" class="status done">✓ Done</div>
      <div class="empty"><div style="font-size:32px;opacity:.3">◈</div>
      <div style="font-size:13px">No setups found</div>
      <div style="font-size:11px;opacity:.6">Try increasing candle limits or entry window</div></div>`;
    return;
  }

  const bulls =R.filter(r=>r.htfDir==='BULL');
  const bears =R.filter(r=>r.htfDir==='BEAR');
  const wicks =R.filter(r=>r.htfType==='wick');
  const stops =R.filter(r=>r.outcome==='stopped');
  const fullT =R.filter(r=>r.outcome==='full_target');
  const p50   =R.filter(r=>r.outcome==='partial_50');
  const part  =R.filter(r=>r.outcome==='partial');
  const missed=R.filter(r=>r.outcome==='missed');
  const fvgR  =R.filter(r=>r.hasFVG);
  const obR   =R.filter(r=>r.hasOB);
  const rawR  =R.filter(r=>r.entryType==='RAW');
  const hiSc  =R.filter(r=>r.score>=4);
  const winRate=n?Math.round((fullT.length+p50.length)/n*100):0;
  const avgRR =n?(R.reduce((s,r)=>s+parseFloat(r.rrFull),0)/n).toFixed(1):0;

  const pct=x=>n?Math.round(x/n*100):0;
  const wr=arr=>arr.length?Math.round(arr.filter(r=>['full_target','partial_50'].includes(r.outcome)).length/arr.length*100):0;

  // Time distributions
  const bCS={},bCD={},bCW={},bCM={},bES={},bED={};
  R.forEach(r=>{
    bCS[r.crtSes]=(bCS[r.crtSes]||0)+1;
    bCD[r.crtDow]=(bCD[r.crtDow]||0)+1;
    bCW[r.crtWom]=(bCW[r.crtWom]||0)+1;
    bCM[r.crtMoy]=(bCM[r.crtMoy]||0)+1;
    bES[r.entrySession]=(bES[r.entrySession]||0)+1;
    bED[r.entryDow]=(bED[r.entryDow]||0)+1;
  });
  const mCS=Math.max(...Object.values(bCS),1);
  const mCD=Math.max(...Object.values(bCD),1);
  const mCW=Math.max(...Object.values(bCW),1);
  const mCM=Math.max(...Object.values(bCM),1);
  const mES=Math.max(...Object.values(bES),1);
  const mED=Math.max(...Object.values(bED),1);

  const tfTag=tf=>tf==='1M'?'t1m':tf==='1w'?'t1w':'t1d';
  const oTag=o=>o==='full_target'?'tdel':o==='partial_50'?'tpar':o==='stopped'?'tstop':o==='partial'?'tpar':'tmis';
  const oLabel=o=>o.replace(/_/g,' ');
  const etTag=t=>t==='FVG'?'tfvg':t==='OB'?'tob':'traw';

  const rows=[...R].slice(-60).reverse().map(r=>`
    <tr>
      <td>${fd(r.htfTs)}</td>
      <td>${fd(r.dailyTs)}</td>
      <td>${fd(r.entryTs)}</td>
      <td><span class="tag ${r.htfDir==='BULL'?'tbull':'tbear'}">${r.htfDir}</span></td>
      <td><span class="tag ${tfTag(r.htfTf)}">${r.htfTf}</span></td>
      <td><span class="tag ${r.htfType==='wick'?'twk':'tcl'}">${r.htfType}</span></td>
      <td style="color:var(--mt)">${r.crtSes}</td>
      <td style="color:var(--mt)">${r.crtDow}</td>
      <td style="color:var(--mt)">${r.crtWom}</td>
      <td style="color:var(--mt)">${r.crtMoy}</td>
      <td style="color:var(--mt)">${r.entrySession}</td>
      <td><span class="tag ${etTag(r.entryType)}">${r.entryType}</span></td>
      <td style="color:var(--ac)">${r.score}/${r.scoreMax}</td>
      <td style="color:var(--mt)">${fp(r.entryPrice)}</td>
      <td style="color:var(--mt)">${fp(r.stopPrice)}</td>
      <td class="${parseFloat(r.rrFull)>=3?'bull':parseFloat(r.rrFull)>=1.5?'wc':'bear'}">${r.rrFull}R</td>
      <td>
        <div class="db">
          <span class="dp" style="color:${dc(r.delPct)}">${r.delPct}%</span>
          <div class="mb"><div class="mf" style="width:${r.delPct}%;background:${dc(r.delPct)}"></div></div>
        </div>
      </td>
      <td><span class="tag ${oTag(r.outcome)}">${oLabel(r.outcome)}</span></td>
    </tr>`).join('');

  document.getElementById('main').innerHTML=`
    <div id="sl" class="status done">✓ ${n} setups · ${sym} · ${etf} entry · ${capLoss}% SL</div>
    <div class="tabs">
      <div class="tab active" id="tb1" onclick="st(1)">Summary</div>
      <div class="tab" id="tb2" onclick="st(2)">Manip Time</div>
      <div class="tab" id="tb3" onclick="st(3)">Insights</div>
      <div class="tab" id="tb4" onclick="st(4)">Signal Log</div>
    </div>

    <!-- SUMMARY -->
    <div class="tc active" id="tc1">
      <div class="cards">
        <div class="card"><div class="cl">Setups</div><div class="cv ac">${n}</div></div>
        <div class="card"><div class="cl">Win Rate</div><div class="cv bull">${winRate}%</div><div class="cs">full+50%</div></div>
        <div class="card"><div class="cl">Full Target</div><div class="cv bull">${fullT.length}</div><div class="cs">${pct(fullT.length)}%</div></div>
        <div class="card"><div class="cl">Partial 50%</div><div class="cv wc">${p50.length}</div><div class="cs">${pct(p50.length)}%</div></div>
        <div class="card"><div class="cl">Partial</div><div class="cv wc">${part.length}</div><div class="cs">${pct(part.length)}%</div></div>
        <div class="card"><div class="cl">Stopped</div><div class="cv bear">${stops.length}</div><div class="cs">${pct(stops.length)}%</div></div>
        <div class="card"><div class="cl">Missed</div><div class="cv bear">${missed.length}</div><div class="cs">${pct(missed.length)}%</div></div>
        <div class="card"><div class="cl">Avg RR</div><div class="cv ac">${avgRR}R</div></div>
        <div class="card"><div class="cl">Bull</div><div class="cv bull">${bulls.length}</div><div class="cs">${pct(bulls.length)}%</div></div>
        <div class="card"><div class="cl">Bear</div><div class="cv bear">${bears.length}</div><div class="cs">${pct(bears.length)}%</div></div>
        <div class="card"><div class="cl">Wick CRT</div><div class="cv wc">${wicks.length}</div><div class="cs">Higher weight</div></div>
        <div class="card"><div class="cl">High Score</div><div class="cv ac">${hiSc.length}</div><div class="cs">≥4 pts</div></div>
      </div>
      <div>
        <div class="st">Entry Distribution</div>
        <div class="g4">
          <div class="tb"><div class="tt">Entry Session</div>${bar(bES,mES)}</div>
          <div class="tb"><div class="tt">Entry Day</div>${bar(bED,mED)}</div>
          <div class="tb"><div class="tt">Entry Type</div>
            ${[['FVG',fvgR.length],['OB',obR.length],['RAW',rawR.length]].map(([l,v])=>`
            <div class="br"><span class="bl">${l}</span>
            <div class="btr"><div class="bf" style="width:${Math.round(v/n*100)}%"></div></div>
            <span class="bc">${v}</span></div>`).join('')}
          </div>
          <div class="tb"><div class="tt">HTF Timeframe</div>
            ${[['1M',R.filter(r=>r.htfTf==='1M').length],['1w',R.filter(r=>r.htfTf==='1w').length],['1d',R.filter(r=>r.htfTf==='1d').length]].map(([l,v])=>`
            <div class="br"><span class="bl">${l}</span>
            <div class="btr"><div class="bf" style="width:${Math.round(v/n*100)}%"></div></div>
            <span class="bc">${v}</span></div>`).join('')}
          </div>
        </div>
      </div>
    </div>

    <!-- MANIP TIME -->
    <div class="tc" id="tc2">
      <div class="st">When Did the HTF Manipulation Candle Form?</div>
      <div class="g4">
        <div class="tb"><div class="tt">Session</div>${bar(bCS,mCS)}</div>
        <div class="tb"><div class="tt">Day of Week</div>${bar(bCD,mCD)}</div>
        <div class="tb"><div class="tt">Week of Month</div>${bar(bCW,mCW)}</div>
        <div class="tb"><div class="tt">Month of Year</div>${bar(bCM,mCM)}</div>
      </div>
    </div>

    <!-- INSIGHTS -->
    <div class="tc" id="tc3">
      <div class="g2">
        <div class="ib"><div class="it">Entry Type vs Win Rate</div>
          <div class="ir"><span class="il">FVG entry (${fvgR.length})</span><span class="iv" style="color:var(--bull)">${wr(fvgR)}%</span></div>
          <div class="ir"><span class="il">OB entry (${obR.length})</span><span class="iv" style="color:var(--wk)">${wr(obR)}%</span></div>
          <div class="ir"><span class="il">Raw level (${rawR.length})</span><span class="iv" style="color:var(--mt)">${wr(rawR)}%</span></div>
        </div>
        <div class="ib"><div class="it">Wick vs Close CRT</div>
          <div class="ir"><span class="il">Wick win rate (${wicks.length})</span><span class="iv" style="color:var(--bull)">${wr(wicks)}%</span></div>
          <div class="ir"><span class="il">Close win rate (${R.filter(r=>r.htfType==='close').length})</span><span class="iv" style="color:var(--wk)">${wr(R.filter(r=>r.htfType==='close'))}%</span></div>
        </div>
        <div class="ib"><div class="it">By HTF Timeframe</div>
          ${['1M','1w','1d'].map(tf=>{const s=R.filter(r=>r.htfTf===tf);return s.length?`
          <div class="ir"><span class="il"><span class="tag ${tfTag(tf)}">${tf}</span> ${s.length} signals</span>
          <span class="iv" style="color:var(--bull)">${wr(s)}% win</span></div>`:''}).join('')}
        </div>
        <div class="ib"><div class="it">High Score (≥4) vs All</div>
          <div class="ir"><span class="il">High score win rate</span><span class="iv" style="color:var(--bull)">${wr(hiSc)}%</span></div>
          <div class="ir"><span class="il">All setups win rate</span><span class="iv" style="color:var(--wk)">${winRate}%</span></div>
          <div class="ir"><span class="il">High score avg RR</span><span class="iv">${hiSc.length?(hiSc.reduce((s,r)=>s+parseFloat(r.rrFull),0)/hiSc.length).toFixed(1):0}R</span></div>
        </div>
      </div>
    </div>

    <!-- SIGNAL LOG -->
    <div class="tc" id="tc4">
      <div class="st">Last 60 Setups</div>
      <div class="tw"><table>
        <thead><tr>
          <th>HTF CRT</th><th>Daily CRT</th><th>Entry</th>
          <th>Dir</th><th>HTF</th><th>Type</th>
          <th>CRT Ses</th><th>CRT DoW</th><th>CRT WoM</th><th>CRT Month</th>
          <th>Entry Ses</th><th>Entry Type</th><th>Score</th>
          <th>Entry $</th><th>Stop $</th><th>RR</th><th>Delivery</th><th>Outcome</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>
  `;
  st(1);
}

function st(n){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tc').forEach(c=>c.classList.remove('active'));
  const t=document.getElementById(`tb${n}`),c=document.getElementById(`tc${n}`);
  if(t)t.classList.add('active');if(c)c.classList.add('active');
}
</script>
