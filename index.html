<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CRT Backtester</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --border-bright: #2a2a3e;
    --text: #e2e2f0;
    --muted: #6b6b8a;
    --bull: #00c896;
    --bear: #ff4d6d;
    --wick: #f0b429;
    --accent: #7c6fff;
    --accent-dim: rgba(124,111,255,0.12);
    --font-mono: 'SF Mono','Fira Code','Consolas',monospace;
    --font: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; -webkit-font-smoothing: antialiased; }

  header { border-bottom: 1px solid var(--border); padding: 18px 20px 14px; display: flex; align-items: baseline; gap: 12px; }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
  header span { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }

  .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 53px); }

  aside { border-right: 1px solid var(--border); padding: 20px 16px; display: flex; flex-direction: column; gap: 18px; }

  .field-group label { display: block; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  select, input[type=number] { width: 100%; background: var(--surface); border: 1px solid var(--border-bright); border-radius: 6px; color: var(--text); font-family: var(--font-mono); font-size: 13px; padding: 8px 10px; outline: none; appearance: none; -webkit-appearance: none; transition: border-color 0.15s; }
  select:focus, input:focus { border-color: var(--accent); }

  .htf-stack { display: flex; flex-direction: column; gap: 6px; }
  .htf-row { display: flex; align-items: center; gap: 8px; font-size: 12px; font-family: var(--font-mono); color: var(--muted); }
  .htf-row input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
  .htf-row span { flex: 1; }
  .htf-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; background: var(--accent-dim); color: var(--accent); letter-spacing: 0.06em; }

  .run-btn { width: 100%; padding: 11px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.15s, transform 0.1s; margin-top: auto; }
  .run-btn:active { transform: scale(0.98); opacity: 0.85; }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  main { padding: 20px; display: flex; flex-direction: column; gap: 20px; overflow-x: hidden; }

  .status { font-family: var(--font-mono); font-size: 12px; color: var(--muted); min-height: 18px; }
  .status.loading { color: var(--accent); }
  .status.error { color: var(--bear); }
  .status.done { color: var(--bull); }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .card-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .card-value { font-size: 22px; font-weight: 700; font-family: var(--font-mono); line-height: 1; }
  .card-sub { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--font-mono); }
  .bull { color: var(--bull); } .bear { color: var(--bear); } .wick-col { color: var(--wick); } .accent { color: var(--accent); }

  .section-title { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 12px; }

  .time-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
  .time-block { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .time-block-title { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .bar-label { font-family: var(--font-mono); font-size: 11px; color: var(--muted); width: 40px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }
  .bar-count { font-family: var(--font-mono); font-size: 11px; color: var(--text); width: 24px; text-align: right; flex-shrink: 0; }

  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(--border); border-radius: 8px; }
  table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 12px; white-space: nowrap; }
  thead tr { background: var(--surface); border-bottom: 1px solid var(--border); }
  th { padding: 10px 14px; text-align: left; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  td { padding: 9px 14px; border-bottom: 1px solid var(--border); color: var(--text); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(124,111,255,0.04); }

  .tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; }
  .tag-bull { background: rgba(0,200,150,0.12); color: var(--bull); }
  .tag-bear { background: rgba(255,77,109,0.12); color: var(--bear); }
  .tag-wick { background: rgba(240,180,41,0.12); color: var(--wick); }
  .tag-close { background: rgba(124,111,255,0.12); color: var(--accent); }
  .tag-del { background: rgba(0,200,150,0.12); color: var(--bull); }
  .tag-par { background: rgba(240,180,41,0.12); color: var(--wick); }
  .tag-mis { background: rgba(255,77,109,0.12); color: var(--bear); }

  .delivery-bar { display: flex; align-items: center; gap: 6px; }
  .delivery-pct { font-size: 11px; width: 38px; }
  .mini-bar { width: 60px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .mini-fill { height: 100%; border-radius: 2px; }

  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--muted); gap: 10px; text-align: center; }
  .empty-icon { font-size: 32px; opacity: 0.3; }
  .empty-text { font-size: 13px; }
  .empty-sub { font-size: 11px; opacity: 0.6; }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    aside { border-right: none; border-bottom: 1px solid var(--border); padding: 16px; }
    .time-grid { grid-template-columns: 1fr; }
    .cards { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<header>
  <h1>CRT Backtester</h1>
  <span>Candle Range Theory · HTF Bias Engine</span>
</header>

<div class="layout">
  <aside>
    <div class="field-group">
      <label>Symbol</label>
      <select id="symbol">
        <option value="BTCUSDT">BTC/USDT</option>
        <option value="ETHUSDT">ETH/USDT</option>
        <option value="SOLUSDT">SOL/USDT</option>
        <option value="BNBUSDT">BNB/USDT</option>
        <option value="XRPUSDT">XRP/USDT</option>
      </select>
    </div>

    <div class="field-group">
      <label>Base Timeframe</label>
      <select id="baseTf">
        <option value="1d" selected>Daily (1d)</option>
        <option value="4h">4 Hour</option>
        <option value="1h">1 Hour</option>
      </select>
    </div>

    <div class="field-group">
      <label>HTF Bias Stack</label>
      <div class="htf-stack">
        <div class="htf-row">
          <input type="checkbox" id="htf_1M" checked>
          <span>Monthly</span><span class="htf-badge">1M</span>
        </div>
        <div class="htf-row">
          <input type="checkbox" id="htf_1w" checked>
          <span>Weekly</span><span class="htf-badge">1w</span>
        </div>
        <div class="htf-row">
          <input type="checkbox" id="htf_1d">
          <span>Daily</span><span class="htf-badge">1d</span>
        </div>
      </div>
    </div>

    <div class="field-group">
      <label>Candle Limit</label>
      <input type="number" id="limit" value="500" min="100" max="1000" step="100">
    </div>

    <div class="field-group">
      <label>Min Delivery %</label>
      <input type="number" id="minDelivery" value="75" min="0" max="100" step="5">
    </div>

    <button class="run-btn" id="runBtn" onclick="run()">Run Backtest</button>
  </aside>

  <main id="main">
    <div class="empty">
      <div class="empty-icon">◈</div>
      <div class="empty-text">Configure and run the backtest</div>
      <div class="empty-sub">Results will appear here</div>
    </div>
  </main>
</div>

<script>
// ── Binance REST API (no library needed)
const BASE = 'https://api.binance.com/api/v3/klines';

const TF_MAP = { '1h':'1h', '4h':'4h', '1d':'1d', '1w':'1w', '1M':'1M' };

async function fetchOHLCV(symbol, tf, limit) {
  const url = `${BASE}?symbol=${symbol}&interval=${TF_MAP[tf]}&limit=${limit}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Binance API error: ${res.status} ${res.statusText}`);
  const raw = await res.json();
  return raw.map(c => ({
    ts: c[0],
    open: parseFloat(c[1]),
    high: parseFloat(c[2]),
    low:  parseFloat(c[3]),
    close:parseFloat(c[4]),
    vol:  parseFloat(c[5])
  }));
}

// ── CRT signal detection
// Returns classification of candle[i] relative to candle[i-1] range
function detectBias(candles) {
  const out = [];
  for (let i = 1; i < candles.length; i++) {
    const prev = candles[i-1];
    const cur  = candles[i];
    let dir = null, type = null;

    // Bullish wick: sweeps below prev low, closes back inside
    if (cur.low < prev.low && cur.close >= prev.low) {
      dir = 'BULL'; type = 'wick';
    }
    // Bearish wick: sweeps above prev high, closes back inside
    else if (cur.high > prev.high && cur.close <= prev.high) {
      dir = 'BEAR'; type = 'wick';
    }
    // Bullish close: closes above prev high (continuation)
    else if (cur.close > prev.high) {
      dir = 'BULL'; type = 'close';
    }
    // Bearish close: closes below prev low (continuation)
    else if (cur.close < prev.low) {
      dir = 'BEAR'; type = 'close';
    }

    out.push({ i, ts: cur.ts, dir, type,
      prevHigh: prev.high, prevLow: prev.low, candle: cur });
  }
  return out;
}

// ── Time context from UTC timestamp
function timeContext(ts) {
  const d   = new Date(ts);
  const h   = d.getUTCHours();
  const day = d.getUTCDate();
  const dow = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getUTCDay()];
  const wom = day <= 7 ? 'W1' : day <= 14 ? 'W2' : day <= 21 ? 'W3' : day <= 28 ? 'W4' : 'W5';
  const moy = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getUTCMonth()];
  let session = 'Asia';
  if (h >= 7  && h < 12) session = 'London';
  else if (h >= 12 && h < 20) session = 'New York';
  else if (h >= 20) session = 'Late NY';
  return { session, dow, wom, moy };
}

// ── Timing score per your rules
function timingScore(type, tf, ctx) {
  let score = 0, max = 0;
  if (tf === '1M') {
    max += 2;
    if (type === 'wick') score++;
    if (['W1','W2','W3'].includes(ctx.wom)) score++;
  }
  if (tf === '1w') {
    max += 2;
    if (type === 'wick') score++;
    if (['Mon','Tue','Wed'].includes(ctx.dow)) score++;
  }
  if (tf === '1d') {
    max += 2;
    if (type === 'wick') score++;
    if (['London','New York'].includes(ctx.session)) score++;
  }
  return { score, max };
}

// ── Delivery: did price reach opposite extreme after signal?
function measureDelivery(candles, fromIdx, dir, prevHigh, prevLow, minDel) {
  const range = prevHigh - prevLow;
  if (range === 0) return { pct: 0, outcome: 'missed' };
  const origin = candles[fromIdx].open;
  const target = dir === 'BULL' ? prevHigh : prevLow;
  let best = dir === 'BULL' ? candles[fromIdx].low : candles[fromIdx].high;

  for (let j = fromIdx; j < Math.min(fromIdx + 10, candles.length); j++) {
    if (dir === 'BULL') best = Math.max(best, candles[j].high);
    else                best = Math.min(best, candles[j].low);
  }

  const denom = Math.abs(target - origin);
  if (denom === 0) return { pct: 100, outcome: 'delivered' };
  const progress = dir === 'BULL'
    ? (best - origin) / denom
    : (origin - best) / denom;

  const pct = Math.min(100, Math.max(0, Math.round(progress * 100)));
  const outcome = pct >= minDel ? 'delivered' : pct >= 50 ? 'partial' : 'missed';
  return { pct, outcome };
}

// ── Status helper
function setStatus(cls, msg) {
  let el = document.getElementById('statusLine');
  if (!el) {
    document.getElementById('main').innerHTML = '<div id="statusLine" class="status"></div>';
    el = document.getElementById('statusLine');
  }
  el.className = `status ${cls}`;
  el.textContent = msg;
}

// ── Bar chart helper
function barChart(data, maxVal) {
  return Object.entries(data).sort((a,b)=>b[1]-a[1]).map(([label,count])=>`
    <div class="bar-row">
      <span class="bar-label">${label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/maxVal*100)}%"></div></div>
      <span class="bar-count">${count}</span>
    </div>`).join('');
}

function delColor(pct) {
  return pct >= 75 ? '#00c896' : pct >= 50 ? '#f0b429' : '#ff4d6d';
}

function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit',timeZone:'UTC'});
}

// ── Main backtest
async function run() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true; btn.textContent = 'Running…';
  document.getElementById('main').innerHTML = '<div id="statusLine" class="status loading">Starting…</div>';

  try {
    const symbol    = document.getElementById('symbol').value;
    const baseTf    = document.getElementById('baseTf').value;
    const limit     = parseInt(document.getElementById('limit').value) || 500;
    const minDel    = parseInt(document.getElementById('minDelivery').value) || 75;
    const useMonthly= document.getElementById('htf_1M').checked;
    const useWeekly = document.getElementById('htf_1w').checked;
    const useDaily  = document.getElementById('htf_1d').checked;

    if (!useMonthly && !useWeekly && !useDaily) {
      alert('Select at least one HTF timeframe.'); return;
    }

    // Fetch base candles
    setStatus('loading', `Fetching ${baseTf} candles…`);
    const base = await fetchOHLCV(symbol, baseTf, limit);

    // Fetch HTF candles
    const htf = {};
    if (useMonthly) { setStatus('loading','Fetching 1M candles…'); htf['1M'] = await fetchOHLCV(symbol,'1M',120); }
    if (useWeekly)  { setStatus('loading','Fetching 1w candles…'); htf['1w'] = await fetchOHLCV(symbol,'1w',200); }
    if (useDaily)   { setStatus('loading','Fetching 1d candles…'); htf['1d'] = await fetchOHLCV(symbol,'1d',500); }

    setStatus('loading','Detecting CRT signals…');

    // Pre-compute HTF signals indexed by timestamp
    const htfSignalMap = {};
    const tfOrder = ['1M','1w','1d'].filter(tf => htf[tf]);

    for (const tf of tfOrder) {
      const sigs = detectBias(htf[tf]);
      for (const s of sigs) {
        // Map this HTF signal's timestamp — any base candle within this HTF candle period uses it
        if (!htfSignalMap[s.ts]) htfSignalMap[s.ts] = [];
        htfSignalMap[s.ts].push({ tf, ...s });
      }
    }

    // For each base candle, find the dominant HTF bias
    const results = [];

    for (let i = 1; i < base.length - 1; i++) {
      const cur = base[i];

      // Find dominant HTF bias: highest TF that has a signal active at this time
      let dom = null;
      for (const tf of tfOrder) {
        if (!htf[tf]) continue;
        const sigs = detectBias(htf[tf]);
        // Find most recent HTF signal at or before current base candle
        let best = null;
        for (const s of sigs) {
          if (s.ts <= cur.ts && s.dir) {
            if (!best || s.ts > best.ts) best = s;
          }
        }
        if (best) { dom = { tf, ...best }; break; }
      }

      if (!dom) continue;

      // Base candle must align with HTF bias
      const baseSigs = detectBias([base[i-1], cur]);
      const bSig = baseSigs[0];
      if (!bSig || bSig.dir !== dom.dir) continue;

      const ctx = timeContext(cur.ts);
      const { score, max } = timingScore(dom.type, dom.tf, ctx);
      const del = measureDelivery(base, i, dom.dir, dom.prevHigh, dom.prevLow, minDel);

      results.push({
        ts: cur.ts,
        dir: dom.dir,
        type: dom.type,
        htf: dom.tf,
        session: ctx.session,
        dow: ctx.dow,
        wom: ctx.wom,
        moy: ctx.moy,
        score, max,
        delivery: del.pct,
        outcome: del.outcome,
      });
    }

    // ── Render results
    const total     = results.length;
    const bulls     = results.filter(r=>r.dir==='BULL');
    const bears     = results.filter(r=>r.dir==='BEAR');
    const wicks     = results.filter(r=>r.type==='wick');
    const delivered = results.filter(r=>r.outcome==='delivered');
    const partial   = results.filter(r=>r.outcome==='partial');
    const missed    = results.filter(r=>r.outcome==='missed');
    const highProb  = results.filter(r=>r.score>=2);
    const avgDel    = total ? (results.reduce((s,r)=>s+r.delivery,0)/total).toFixed(1) : 0;

    const bySession={}, byDow={}, byWom={};
    results.forEach(r=>{
      bySession[r.session]=(bySession[r.session]||0)+1;
      byDow[r.dow]=(byDow[r.dow]||0)+1;
      byWom[r.wom]=(byWom[r.wom]||0)+1;
    });

    const pct = n => total ? Math.round(n/total*100) : 0;

    const rows = [...results].slice(-50).reverse().map(r=>`
      <tr>
        <td>${fmtDate(r.ts)}</td>
        <td><span class="tag ${r.dir==='BULL'?'tag-bull':'tag-bear'}">${r.dir}</span></td>
        <td><span class="tag ${r.type==='wick'?'tag-wick':'tag-close'}">${r.type}</span></td>
        <td style="color:var(--muted)">${r.htf}</td>
        <td style="color:var(--muted)">${r.session}</td>
        <td style="color:var(--muted)">${r.dow}</td>
        <td style="color:var(--muted)">${r.wom}</td>
        <td style="color:var(--accent)">${r.score}/${r.max}</td>
        <td>
          <div class="delivery-bar">
            <span class="delivery-pct" style="color:${delColor(r.delivery)}">${r.delivery}%</span>
            <div class="mini-bar"><div class="mini-fill" style="width:${r.delivery}%;background:${delColor(r.delivery)}"></div></div>
          </div>
        </td>
        <td><span class="tag ${r.outcome==='delivered'?'tag-del':r.outcome==='partial'?'tag-par':'tag-mis'}">${r.outcome}</span></td>
      </tr>`).join('');

    const maxS=Math.max(...Object.values(bySession),1);
    const maxD=Math.max(...Object.values(byDow),1);
    const maxW=Math.max(...Object.values(byWom),1);

    document.getElementById('main').innerHTML = `
      <div id="statusLine" class="status done">✓ ${total} signals · ${symbol} · ${baseTf}</div>

      <div class="cards">
        <div class="card"><div class="card-label">Signals</div><div class="card-value accent">${total}</div></div>
        <div class="card"><div class="card-label">Bullish</div><div class="card-value bull">${bulls.length}</div><div class="card-sub">${pct(bulls.length)}%</div></div>
        <div class="card"><div class="card-label">Bearish</div><div class="card-value bear">${bears.length}</div><div class="card-sub">${pct(bears.length)}%</div></div>
        <div class="card"><div class="card-label">Wick</div><div class="card-value wick-col">${wicks.length}</div><div class="card-sub">Higher weight</div></div>
        <div class="card"><div class="card-label">Delivered</div><div class="card-value bull">${delivered.length}</div><div class="card-sub">${pct(delivered.length)}%</div></div>
        <div class="card"><div class="card-label">Partial</div><div class="card-value wick-col">${partial.length}</div><div class="card-sub">${pct(partial.length)}%</div></div>
        <div class="card"><div class="card-label">Missed</div><div class="card-value bear">${missed.length}</div><div class="card-sub">${pct(missed.length)}%</div></div>
        <div class="card"><div class="card-label">Avg Delivery</div><div class="card-value accent">${avgDel}%</div></div>
        <div class="card"><div class="card-label">High Prob</div><div class="card-value wick-col">${highProb.length}</div><div class="card-sub">Score ≥ 2</div></div>
      </div>

      <div>
        <div class="section-title">Time Context</div>
        <div class="time-grid">
          <div class="time-block"><div class="time-block-title">Session</div>${barChart(bySession,maxS)}</div>
          <div class="time-block"><div class="time-block-title">Day of Week</div>${barChart(byDow,maxD)}</div>
          <div class="time-block"><div class="time-block-title">Week of Month</div>${barChart(byWom,maxW)}</div>
        </div>
      </div>

      <div>
        <div class="section-title">Last 50 Signals</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Dir</th><th>Type</th><th>HTF</th><th>Session</th><th>DoW</th><th>WoM</th><th>Score</th><th>Delivery</th><th>Outcome</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;

  } catch(e) {
    console.error(e);
    setStatus('error', `Error: ${e.message}`);
  }

  btn.disabled = false; btn.textContent = 'Run Backtest';
}
</script>
</body>
</html>
